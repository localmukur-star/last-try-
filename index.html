<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sliding Puzzle Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🧩 Sliding Puzzle</h1>
        <div class="controls">
            <div class="difficulty-selector">
                <label for="difficulty">Difficulty:</label>
                <select id="difficulty">
                    <option value="3">Easy (3x3)</option>
                    <option value="4" selected>Medium (4x4)</option>
                    <option value="5">Hard (5x5)</option>
                </select>
            </div>
            <button id="newGame" class="btn btn-primary">New Game</button>
        </div>
        
        <div class="stats">
            <div class="stat">
                <span class="stat-label">Moves:</span>
                <span id="moves" class="stat-value">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">Time:</span>
                <span id="time" class="stat-value">00:00</span>
            </div>
        </div>

        <div id="puzzle" class="puzzle"></div>

        <div id="winMessage" class="win-message hidden">
            <h2>🎉 Congratulations!</h2>
            <p>You solved the puzzle!</p>
            <p id="winStats"></p>
            <button id="playAgain" class="btn btn-primary">Play Again</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
